<div class="hdr">
  <div class="logo">P</div>
  <div>
    <h1>POLAX</h1>
    <p id="hdrSub">Юнит-экономика · Allegro PL · загрузка…</p>
  </div>
  <div class="hdr-nav">
    <a href="index.html" class="btn-nav">← Главная</a>
    <a href="analytics.html" class="btn-nav">Подробная аналитика</a>
    <a href="categories.html" class="btn-nav">Продажи по категориям</a>
  </div>
</div>

<div id="mainContent">
  <div class="loading">
    <div class="loading-spin"></div><br>
    Загрузка каталога и данных…
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar"></div>

<div class="footer" id="footer">POLAX · Юнит-экономика</div>

<script>
// ── Constants ─────────────────────────────────────────────────
const SHOPS = ['Mlot_i_Klucz','PolaxEuroGroup','Sila_Narzedzi'];
const SL    = {Mlot_i_Klucz:'Mlot i Klucz',PolaxEuroGroup:'PolaxEuroGroup',Sila_Narzedzi:'Sila Narzedzi'};
const SC    = {Mlot_i_Klucz:'#BA7517',PolaxEuroGroup:'#0F6E56',Sila_Narzedzi:'#185FA5'};
const ST    = {Mlot_i_Klucz:'st-mlot',PolaxEuroGroup:'st-polax',Sila_Narzedzi:'st-sila'};
const SHORT = {Mlot_i_Klucz:'Mlot',PolaxEuroGroup:'Polax',Sila_Narzedzi:'Sila'};
const BADGE = {hit:'★ Хит',winning:'↑ Выигрывает',losing:'✕ Проигрышный',sleeping:'◎ Спящий',nocog:'? Нет COG'};
const BCLS  = {hit:'b-hit',winning:'b-winning',losing:'b-losing',sleeping:'b-sleeping',nocog:'b-nocog'};
const PER_PAGE = 50;
const HIT_TOP_N = 50;             // топ N по продажам = хит

// ── App state ─────────────────────────────────────────────────
let PRODUCTS   = [];          // [{ean,sku,name,category,cog,offers,price}]
let offerToKey = {};          // offerId → product key (ean: or sku: or offer:)
let keyToIdx   = {};          // product key → index in PRODUCTS[]

let monthData  = {};          // {ym: {month,days}} — loaded monthly files cache
let loadingYMs = new Set();   // months currently being fetched
let aggCache   = null;        // {key: {shop: {sales,revenue,fees,ads,promo,cost}}} for current period
let statusCache= null;        // {key: status_string}

let DATE_MIN = '2026-01-01';
let DATE_MAX = '2026-03-21';

// UI state
let curShop    = 'all';
let curFilter  = 'all';
let curCat     = '';
let sortCol    = 'revenue';
let sortDir    = 'desc';
let curPage    = 1;
let selKey     = null;
let datePreset = 'all';
let dateFrom   = DATE_MIN;
let dateTo     = DATE_MAX;
let dataReady  = false;

// ── Helpers ───────────────────────────────────────────────────
function zl(n) {
  return Math.round(Math.abs(n)).toLocaleString('ru-RU') + ' zł';
}
function fmtCog(cog) {
  if (cog === null || cog === undefined) return '—';
  return (Number.isInteger(cog) ? cog.toLocaleString('ru-RU')
                                : cog.toFixed(2).replace('.',',')) + ' zł';
}
function datesInRange(from, to) {
  const dates = [];
  let d = new Date(from);
  const end = new Date(to);
  while (d <= end) {
    dates.push(d.toISOString().slice(0,10));
    d.setDate(d.getDate()+1);
  }
  return dates;
}
function monthsInRange(from, to) {
  const seen = new Set(), result = [];
  for (const ds of datesInRange(from, to)) {
    const ym = ds.slice(0,7);
    if (!seen.has(ym)) { seen.add(ym); result.push(ym); }
  }
  return result;
}
function productKey(p) {
  if (p.ean)  return 'ean:' + p.ean;
  if (p.sku)  return 'sku:' + p.sku;
  const oid = Object.values(p.offers||{}).find(x=>x);
  return 'offer:' + (oid||Math.random());
}

// ── Data loading ──────────────────────────────────────────────
async function loadProducts() {
  const resp = await fetch('products.json?_=' + Date.now());
  if (!resp.ok) throw new Error('products.json not found');
  const data = await resp.json();
  PRODUCTS = data.products || [];

  // Build reverse lookup: offerId → key, key → index
  offerToKey = {};
  keyToIdx   = {};
  PRODUCTS.forEach((p, i) => {
    const k = productKey(p);
    keyToIdx[k] = i;
    SHOPS.forEach(s => {
      if (p.offers && p.offers[s]) offerToKey[p.offers[s]] = k;
    });
  });
  return data;
}

async function loadMonthData(ym) {
  if (monthData[ym] || loadingYMs.has(ym)) return;
  loadingYMs.add(ym);
  try {
    const resp = await fetch(`unit_data/${ym}.json?_=` + Date.now());
    if (resp.ok) {
      monthData[ym] = await resp.json();
    } else {
      monthData[ym] = {month: ym, days: {}};  // no data for this month yet
    }
  } catch(e) {
    monthData[ym] = {month: ym, days: {}};
  } finally {
    loadingYMs.delete(ym);
  }
}

async function ensureMonthsLoaded(from, to) {
  const yms = monthsInRange(from, to);
  await Promise.all(yms.map(ym => loadMonthData(ym)));
}

// ── Aggregation engine ────────────────────────────────────────
// Builds aggCache: {productKey: {shop: {sales,revenue,fees,ads,promo}}}
// Also builds offerLevelAgg: {productKey: {shop: {sales,revenue,fees,ads,promo}}}
function buildAggCache(from, to) {
  const agg = {};  // key → {shop → {sales,revenue,fees,ads,promo}}

  const dates = datesInRange(from, to);
  for (const date of dates) {
    const ym = date.slice(0,7);
    const md = monthData[ym];
    if (!md) continue;
    const dayEntry = md.days[date];
    if (!dayEntry) continue;

    for (const shop of SHOPS) {
      const shopData = dayEntry[shop];
      if (!shopData) continue;

      for (const [oid, vals] of Object.entries(shopData)) {
        const key = offerToKey[oid];
        if (!key) continue;  // offer not in catalog

        if (!agg[key]) agg[key] = {};
        if (!agg[key][shop]) agg[key][shop] = {sales:0, revenue:0, fees:0, ads:0, promo:0};

        const a = agg[key][shop];
        // vals = [sales, revenue, fees, ads, promo]
        a.sales   += vals[0] || 0;
        a.revenue += vals[1] || 0;
        a.fees    += vals[2] || 0;
        a.ads     += vals[3] || 0;
        a.promo   += vals[4] || 0;
      }
    }
  }

  // Round all values
  for (const key of Object.keys(agg)) {
    for (const shop of Object.keys(agg[key])) {
      const a = agg[key][shop];
      a.revenue = Math.round(a.revenue * 100) / 100;
      a.fees    = Math.round(a.fees    * 100) / 100;
      a.ads     = Math.round(a.ads     * 100) / 100;
      a.promo   = Math.round(a.promo   * 100) / 100;
    }
  }

  aggCache = agg;
}

// ── Per-product data getters ──────────────────────────────────
function getShopData(p, shop) {
  // Returns {sales,revenue,fees,ads,promo} or null
  const key = productKey(p);
  if (!aggCache || !aggCache[key] || !aggCache[key][shop]) return null;
  return aggCache[key][shop];
}

function combineShops(p) {
  // Returns combined {sales,revenue,fees,ads,promo,cost} for all shops
  const result = {sales:0, revenue:0, fees:0, ads:0, promo:0, cost:0};
  for (const shop of SHOPS) {
    const d = getShopData(p, shop);
    if (!d) continue;
    result.sales   += d.sales;
    result.revenue += d.revenue;
    result.fees    += d.fees;
    result.ads     += d.ads;
    result.promo   += d.promo;
    const cog = (p.cog && p.cog[shop]) || 0;
    result.cost += cog * d.sales;
  }
  result.revenue = Math.round(result.revenue * 100) / 100;
  result.fees    = Math.round(result.fees    * 100) / 100;
  result.ads     = Math.round(result.ads     * 100) / 100;
  result.promo   = Math.round(result.promo   * 100) / 100;
  result.cost    = Math.round(result.cost    * 100) / 100;
  return result;
}

function getProductData(p, shop) {
  // Returns augmented data {sales,revenue,fees,ads,promo,cost} or null
  if (shop === 'all') {
    const d = combineShops(p);
    return (d.revenue > 0 || d.sales > 0) ? d : null;
  }
  const d = getShopData(p, shop);
  if (!d) return null;
  const cog = (p.cog && p.cog[shop]) || 0;
  return {...d, cost: Math.round(cog * d.sales * 100) / 100};
}

function margin(d) {
  if (!d) return 0;
  return d.revenue - (d.cost||0) - d.fees - d.ads - d.promo;
}
function marginPct(d) {
  return (d && d.revenue > 0) ? margin(d) / d.revenue * 100 : 0;
}

// ── Status calculation ────────────────────────────────────────
// Hits = top HIT_TOP_N by sales (among positive-margin products)
function buildStatusCache() {
  // Compute sales for all products in current shop context
  const salesList = PRODUCTS.map(p => {
    const d = getProductData(p, curShop);
    return {key: productKey(p), sales: d ? d.sales : 0, d};
  }).sort((a, b) => b.sales - a.sales);

  const hitKeys = new Set();
  let hitCount = 0;
  for (const item of salesList) {
    if (hitCount >= HIT_TOP_N) break;
    if (item.sales > 0) {
      const mp = marginPct(item.d);
      if (mp >= 0) {
        hitKeys.add(item.key);
        hitCount++;
      }
    }
  }

  const cache = {};
  for (const p of PRODUCTS) {
    const key = productKey(p);
    const d   = getProductData(p, curShop);

    if (!d || d.sales === 0) {
      cache[key] = 'sleeping';
      continue;
    }

    const hasCog = curShop === 'all'
      ? SHOPS.some(s => p.offers && p.offers[s] && p.cog && p.cog[s] > 0)
      : (p.cog && p.cog[curShop] > 0);

    if (!hasCog) { cache[key] = 'nocog'; continue; }

    if (d.sales === 0) {
      cache[key] = 'sleeping';
    } else if (marginPct(d) < 0) {
      cache[key] = 'losing';
    } else if (hitKeys.has(key)) {
      cache[key] = 'hit';
    } else {
      cache[key] = 'winning';
    }
  }
  statusCache = cache;
}

function getStatus(p) {
  return (statusCache && statusCache[productKey(p)]) || 'sleeping';
}

// ── Refresh on period/shop change ────────────────────────────
async function refresh() {
  if (!dataReady) return;
  aggCache    = null;
  statusCache = null;

  // Ensure month files are loaded
  showLoadingPill(true);
  await ensureMonthsLoaded(dateFrom, dateTo);
  showLoadingPill(false);

  buildAggCache(dateFrom, dateTo);
  buildStatusCache();
  curPage = 1;
  renderAll();
}

function showLoadingPill(on) {
  const el = document.getElementById('loadPill');
  if (el) el.style.display = on ? '' : 'none';
}

// ── Filtering & sorting ───────────────────────────────────────
function filteredProducts() {
  return PRODUCTS.filter(p => {
    if (curShop !== 'all' && !(p.offers && p.offers[curShop])) return false;
    if (curCat && p.category !== curCat) return false;
    const st = getStatus(p);
    if (curFilter !== 'all' && st !== curFilter) return false;
    return true;
  });
}

function sortedProducts(arr) {
  return [...arr].sort((a, b) => {
    const da = getProductData(a, curShop) || {sales:0,revenue:0,fees:0,ads:0,promo:0,cost:0};
    const db = getProductData(b, curShop) || {sales:0,revenue:0,fees:0,ads:0,promo:0,cost:0};
    let va, vb;
    if      (sortCol === 'sales')     { va = da.sales;       vb = db.sales; }
    else if (sortCol === 'revenue')   { va = da.revenue;     vb = db.revenue; }
    else if (sortCol === 'fees')      { va = da.fees;        vb = db.fees; }
    else if (sortCol === 'margin')    { va = margin(da);     vb = margin(db); }
    else if (sortCol === 'marginPct') { va = marginPct(da);  vb = marginPct(db); }
    else                              { va = da.revenue;     vb = db.revenue; }
    return sortDir === 'desc' ? vb - va : va - vb;
  });
}

function getCounts() {
  const base = PRODUCTS.filter(p => {
    if (curShop !== 'all' && !(p.offers && p.offers[curShop])) return false;
    if (curCat && p.category !== curCat) return false;
    return true;
  });
  const r = {all:0, winning:0, losing:0, hit:0, sleeping:0, nocog:0};
  base.forEach(p => {
    const st = getStatus(p);
    r.all++;
    if (r[st] !== undefined) r[st]++;
  });
  return r;
}

function getCategories() {
  const s = new Set();
  PRODUCTS.forEach(p => {
    if (curShop === 'all' || (p.offers && p.offers[curShop]))
      if (p.category) s.add(p.category);
  });
  return [...s].sort();
}

}

// ── Table ─────────────────────────────────────────────────────
function renderTable() {
  const allFiltered = sortedProducts(filteredProducts());
  const totalPages  = Math.max(1, Math.ceil(allFiltered.length / PER_PAGE));
  if (curPage > totalPages) curPage = 1;
  const page = allFiltered.slice((curPage-1)*PER_PAGE, curPage*PER_PAGE);

  if (allFiltered.length === 0) {
    document.getElementById('tblWrap').innerHTML = '<div class="empty">Нет товаров по выбранным фильтрам</div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const maxRev = Math.max(...allFiltered.map(p => (getProductData(p,curShop)||{revenue:0}).revenue));

  const head = `<div class="tbl-head">
    <span>Продукт</span>
    <span class="${sortCol==='sales'?'sorted':''}" onclick="setSort('sales')">Продажи</span>
    <span class="${sortCol==='revenue'?'sorted':''}" onclick="setSort('revenue')">Доход</span>
    <span class="${sortCol==='fees'?'sorted':''}" onclick="setSort('fees')">Сборы</span>
    <span class="${sortCol==='margin'||sortCol==='marginPct'?'sorted':''}" onclick="setSort('marginPct')">Маржа</span>
    <span></span>
  </div>`;

  const rows = page.map(p => {
    const key = productKey(p);
    const d   = getProductData(p, curShop);
    const st  = getStatus(p);

    if (!d) {
      // Product in catalog but no sales in this period
      const cogVal = curShop==='all' ? null : (p.cog && p.cog[curShop]);
      const meta = buildMeta(p);
      return `<div class="prod-row${selKey===key?' sel':''}" onclick="openSidebar('${key}')">
        <div>
          <div class="pr-badge ${BCLS[st]}">${BADGE[st]}</div>
          <div class="pr-name">${escHtml(p.name)}</div>
          <div class="pr-meta">${meta}</div>
        </div>
        <div class="tc" style="color:#ccc">0 шт.</div>
        <div class="tc" style="color:#ccc">—</div>
        <div class="tc" style="color:#ccc">—</div>
        <div class="tc" style="color:#ccc">—</div>
        <div class="tc-arrow">›</div>
      </div>`;
    }

    const m   = margin(d);
    const mp  = marginPct(d);
    const barW = maxRev > 0 ? Math.round(d.revenue / maxRev * 100) : 0;
    const barC = mp>=35?'#0F6E56':mp>=15?'#BA7517':mp>=0?'#e5a43a':'#A32D2D';
    const meta = buildMeta(p);

    return `<div class="prod-row${selKey===key?' sel':''}" onclick="openSidebar('${key}')">
      <div>
        <div class="pr-badge ${BCLS[st]}">${BADGE[st]}</div>
        <div class="pr-name">${escHtml(p.name)}</div>
        <div class="pr-meta">${meta}</div>
      </div>
      <div class="tc">${d.sales} шт.</div>
      <div class="tc am">${zl(d.revenue)}
        <div class="pbar"><div class="pbar-f" style="width:${barW}%;background:${barC}"></div></div>
      </div>
      <div class="tc rd">−${zl(d.fees)}<small>${d.revenue>0?(d.fees/d.revenue*100).toFixed(1):0}%</small></div>
      <div class="tc ${m>=0?'gr':'rd'}">${m>=0?'':'-'}${zl(m)}<small>${mp.toFixed(1)}%</small></div>
      <div class="tc-arrow">›</div>
    </div>`;
  }).join('');

  document.getElementById('tblWrap').innerHTML = head + rows;
  renderPagination(totalPages, allFiltered.length);
}

function buildMeta(p) {
  if (curShop === 'all') {
    const tags = SHOPS.filter(s => p.offers && p.offers[s])
      .map(s => `<span class="shop-tag ${ST[s]}">${SHORT[s]}: <span class="id-val">…${p.offers[s].slice(-4)}</span></span>`)
      .join('');
    const cogVal = SHOPS.map(s => p.cog && p.cog[s]).find(v => v != null && v > 0);
    return `${tags}<br><span class="id-val">EAN: ${p.ean||'—'}</span> · <span class="id-val">SKU: ${p.sku||'—'}</span> · <span class="cog-line">📦 COG: ${cogVal != null ? fmtCog(cogVal) : '—'}</span>`;
  }
  const oid = p.offers && p.offers[curShop];
  return `ID: <span class="id-val">…${oid?oid.slice(-4):'—'}</span> · <span class="id-val">EAN: ${p.ean||'—'}</span> · <span class="id-val">SKU: ${p.sku||'—'}</span> · <span class="cog-line">📦 COG: ${fmtCog(p.cog&&p.cog[curShop])}</span>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Pagination ────────────────────────────────────────────────
function renderPagination(totalPages, total) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = `<span class="pg-info">${total} товаров</span>`; return; }
  let html = `<button class="pg" onclick="goPage(${curPage-1})" ${curPage===1?'disabled':''}>‹</button>`;
  const start = Math.max(1, curPage-2), end = Math.min(totalPages, curPage+2);
  if (start > 1) html += `<button class="pg" onclick="goPage(1)">1</button>${start>2?'<span class="pg-info">…</span>':''}`;
  for (let i=start; i<=end; i++) html += `<button class="pg${i===curPage?' pgon':''}" onclick="goPage(${i})">${i}</button>`;
  if (end < totalPages) html += `${end<totalPages-1?'<span class="pg-info">…</span>':''}<button class="pg" onclick="goPage(${totalPages})">${totalPages}</button>`;
  html += `<button class="pg" onclick="goPage(${curPage+1})" ${curPage===totalPages?'disabled':''}>›</button>`;
  html += `<span class="pg-info">${total} товаров · стр. ${curPage} из ${totalPages}</span>`;
  el.innerHTML = html;
}

// ── Event handlers ────────────────────────────────────────────
function setShop(s)   { curShop = s; curPage = 1; aggCache = null; statusCache = null; buildAggCache(dateFrom, dateTo); buildStatusCache(); renderAll(); }
function setFilter(f) { curFilter = f; curPage = 1; renderAll(); }
function setCat(c)    { curCat = c; curPage = 1; renderAll(); }
function setSort(col) {
  if (sortCol === col) { sortDir = sortDir==='desc'?'asc':'desc'; }
  else { sortCol = col; sortDir = 'desc'; }
  curPage = 1; renderAll();
}
function toggleDir()  { sortDir = sortDir==='desc'?'asc':'desc'; curPage = 1; renderAll(); }
function goPage(n)    { curPage = n; renderAll(); }

function setDatePreset(p) {
  datePreset = p;
  if (p === 'all')    { dateFrom = DATE_MIN; dateTo = DATE_MAX; }
  if (p === 'last30') {
    const to   = new Date(DATE_MAX);
    const from = new Date(to); from.setDate(from.getDate()-29);
    dateFrom = from.toISOString().slice(0,10);
    dateTo   = DATE_MAX;
  }
  refresh();
}
function setCustomDate(which, val) {
  datePreset = 'custom';
  if (which === 'from') dateFrom = val;
  else                  dateTo   = val;
  if (dateFrom > dateTo) { if (which==='from') dateTo=dateFrom; else dateFrom=dateTo; }
  refresh();
}

// ── CSV Export ────────────────────────────────────────────────
function downloadCSV() {
  const products = sortedProducts(filteredProducts());

  const shopLabel = curShop === 'all' ? 'Все_магазины' : SL[curShop].replace(/\s/g,'_');
  const filterLabel = {all:'Все',hit:'Хиты',winning:'Выигрывает',losing:'Проигрышные',sleeping:'Спящие',nocog:'Без_COG'}[curFilter] || curFilter;
  const periodLabel = datePreset==='all' ? 'все_время' : datePreset==='last30' ? 'посл_30дн' : `${dateFrom}_${dateTo}`;
  const filename = `unit_economy_${shopLabel}_${filterLabel}_${periodLabel}.csv`;

  const headers = ['Название','EAN','SKU','Категория','Статус'];
  if (curShop === 'all') {
    SHOPS.forEach(s => { headers.push(`Offer ${SHORT[s]}`, `COG ${SHORT[s]} (zł)`); });
  } else {
    headers.push('Offer ID', 'COG (zł)');
  }
  headers.push('Продажи (шт)','Доход (zł)','Сборы (zł)','Реклама (zł)','Промо (zł)','Себестоимость (zł)','Маржа (zł)','Маржа (%)');

  const statusLabels = {hit:'Хит',winning:'Выигрывает',losing:'Проигрышный',sleeping:'Спящий',nocog:'Без COG'};
  const csvCell = v => { const s = String(v==null?'':v).replace(/"/g,'""'); return /[,"\n\r]/.test(s)?`"${s}"`:s; };

  const rows = [headers.map(csvCell).join(',')];
  for (const p of products) {
    const d  = getProductData(p, curShop);
    const st = getStatus(p);
    const row = [p.name||'', p.ean||'', p.sku||'', p.category||'', statusLabels[st]||st];

    if (curShop === 'all') {
      SHOPS.forEach(s => {
        row.push((p.offers&&p.offers[s])||'');
        row.push((p.cog&&p.cog[s]!=null) ? p.cog[s] : '');
      });
    } else {
      row.push((p.offers&&p.offers[curShop])||'');
      row.push((p.cog&&p.cog[curShop]!=null) ? p.cog[curShop] : '');
    }

    if (d) {
      const m  = Math.round(margin(d)*100)/100;
      const mp = Math.round(marginPct(d)*10)/10;
      row.push(d.sales, d.revenue, d.fees, d.ads, d.promo, d.cost||0, m, mp);
    } else {
      row.push(0,'','','','','','','');
    }

    rows.push(row.map(csvCell).join(','));
  }

  const blob = new Blob(['\ufeff'+rows.join('\r\n')], {type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── Bootstrap ─────────────────────────────────────────────────
async function init() {
  try {
    const catalog = await loadProducts();
    const updated = catalog.updated || '';

    // Determine date range from data
    const allYMs = Object.keys(monthData);

    // Load initial months (all time = load current month + last 2 months)
    const today = new Date().toISOString().slice(0,10);
    const threeMonthsAgo = new Date();
    threeMonthsAgo.setMonth(threeMonthsAgo.getMonth()-2);
    threeMonthsAgo.setDate(1);
    const defFrom = threeMonthsAgo.toISOString().slice(0,10).slice(0,7) + '-01';

    DATE_MIN  = catalog.date_min || defFrom;
    DATE_MAX  = catalog.date_max || today;
    dateFrom  = DATE_MIN;
    dateTo    = DATE_MAX;

    // Build the main UI shell
    document.getElementById('mainContent').innerHTML = `
      <div class="shop-tabs" id="shopTabs"></div>
      <div class="date-bar"  id="dateBar"></div>
      <div class="filter-bar" id="filterBar"></div>
      <div class="tbl-wrap" id="tblWrap">
        <div class="loading"><div class="loading-spin"></div><br>Загрузка данных…</div>
      </div>
      <div class="pagination" id="pagination"></div>`;

    document.getElementById('hdrSub').textContent =
      `Юнит-экономика · Allegro PL · ${PRODUCTS.length} товаров · обновлено ${updated}`;
    document.getElementById('footer').textContent =
      `POLAX · Юнит-экономика · ${PRODUCTS.length} товаров`;

    dataReady = true;

    // Load data for default period
    await ensureMonthsLoaded(dateFrom, dateTo);
    buildAggCache(dateFrom, dateTo);
    buildStatusCache();
    renderAll();

  } catch(e) {
    document.getElementById('mainContent').innerHTML = `
      <div style="padding:48px;text-align:center;color:#A32D2D;font-size:13px">
        <div style="font-size:28px;margin-bottom:12px">⚠</div>
        <strong>Ошибка загрузки данных</strong><br><br>
        Убедитесь что <code>products.json</code> существует.<br>
        Запустите <code>python fetch_unit_catalog.py</code> для импорта каталога.<br><br>
        <code style="font-size:10px;color:#888">${e.message}</code>
      </div>`;
    console.error('init error:', e);
  }
}

init();
</script>

name: EMAG History

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: 'От (YYYY-MM-DD)'
        required: true
        default: '2026-01-01'
      date_to:
        description: 'До (YYYY-MM-DD)'
        required: true
        default: '2026-05-03'

permissions:
  contents: write

jobs:
  emag-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python fetch_emag_history.py
        env:
          HISTORY_FROM:    ${{ github.event.inputs.date_from }}
          HISTORY_TO:      ${{ github.event.inputs.date_to }}
          EMAG_USERNAME:   ${{ secrets.EMAG_USERNAME }}
          EMAG_PASSWORD:   ${{ secrets.EMAG_PASSWORD }}
      - run: |
          git config user.name "github-actions"
          git config user.email "bot@polax"
          git add data.json
          git diff --staged --quiet || git commit -m "EMAG history ${{ github.event.inputs.date_from }} - ${{ github.event.inputs.date_to }}"
          git pull --rebase origin main
          git push

name: Fetch Days (current month)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-days:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyNaCl

      - name: Collect daily data for current month
        run: python fetch_days.py
        env:
          CLIENT_ID_MLOT:      ${{ secrets.CLIENT_ID_MLOT }}
          CLIENT_SECRET_MLOT:  ${{ secrets.CLIENT_SECRET_MLOT }}
          REFRESH_TOKEN_MLOT:  ${{ secrets.REFRESH_TOKEN_MLOT }}
          CLIENT_ID_POLAX:     ${{ secrets.CLIENT_ID_POLAX }}
          CLIENT_SECRET_POLAX: ${{ secrets.CLIENT_SECRET_POLAX }}
          REFRESH_TOKEN_POLAX: ${{ secrets.REFRESH_TOKEN_POLAX }}
          CLIENT_ID_SILA:      ${{ secrets.CLIENT_ID_SILA }}
          CLIENT_SECRET_SILA:  ${{ secrets.CLIENT_SECRET_SILA }}
          REFRESH_TOKEN_SILA:  ${{ secrets.REFRESH_TOKEN_SILA }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}

      - name: Commit data.json
        run: |
          git config user.name "github-actions"
          git config user.email "bot@polax"
          git add data.json
          git diff --staged --quiet || git commit -m "Daily data: current month $(date +'%Y-%m')"
          git pull --rebase origin main
          git push

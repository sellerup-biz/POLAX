name: Allegro Auth — получить токен

on:
  workflow_dispatch:
    inputs:
      shop:
        description: 'Магазин (MLOT / POLAX / SILA)'
        required: true
        type: choice
        options:
          - MLOT
          - POLAX
          - SILA
      code:
        description: 'Authorization code от Allegro'
        required: true
        type: string

jobs:
  auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyNaCl

      - name: Exchange code and save refresh_token
        run: python auth_exchange.py
        env:
          SHOP:                ${{ github.event.inputs.shop }}
          CODE:                ${{ github.event.inputs.code }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
          CLIENT_ID_MLOT:      ${{ secrets.CLIENT_ID_MLOT }}
          CLIENT_SECRET_MLOT:  ${{ secrets.CLIENT_SECRET_MLOT }}
          CLIENT_ID_POLAX:     ${{ secrets.CLIENT_ID_POLAX }}
          CLIENT_SECRET_POLAX: ${{ secrets.CLIENT_SECRET_POLAX }}
          CLIENT_ID_SILA:      ${{ secrets.CLIENT_ID_SILA }}
          CLIENT_SECRET_SILA:  ${{ secrets.CLIENT_SECRET_SILA }}

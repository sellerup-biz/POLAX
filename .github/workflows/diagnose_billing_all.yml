name: Diagnose Billing All Countries

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests PyNaCl
      - run: python diagnose_billing_all.py
        env:
          CLIENT_ID_POLAX:     ${{ secrets.CLIENT_ID_POLAX }}
          CLIENT_SECRET_POLAX: ${{ secrets.CLIENT_SECRET_POLAX }}
          REFRESH_TOKEN_POLAX: ${{ secrets.REFRESH_TOKEN_POLAX }}
          GH_TOKEN:            ${{ secrets.GH_TOKEN }}
      - run: |
          git config user.name "github-actions"
          git config user.email "bot@polax"
          git add billing_all_jan.json
          git commit -m "Billing diagnostic all countries Jan 2026" || echo "No changes"
          git pull --rebase origin main
          git push

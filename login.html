<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POLAX — Вход</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F4F2EE;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}

.card{background:#fff;border:1px solid #e0dcd4;border-radius:18px;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,0.08)}

.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:2rem;justify-content:center}
.logo{width:48px;height:48px;background:#BA7517;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;letter-spacing:1px;flex-shrink:0}
.logo-text h1{font-size:22px;font-weight:800;letter-spacing:4px;color:#1a1a1a}
.logo-text p{font-size:11px;color:#999;margin-top:2px;letter-spacing:0.5px}

.field{margin-bottom:1rem}
.field label{font-size:11px;font-weight:700;color:#888;letter-spacing:0.8px;text-transform:uppercase;display:block;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;font-size:14px;border:1.5px solid #e0dcd4;border-radius:10px;background:#faf9f7;color:#1a1a1a;outline:none;transition:border-color 0.15s}
.field input:focus{border-color:#BA7517;background:#fff}
.field input::placeholder{color:#bbb}

.btn{width:100%;padding:13px;font-size:14px;font-weight:700;background:#BA7517;color:#fff;border:none;border-radius:10px;cursor:pointer;margin-top:0.5rem;transition:opacity 0.15s;letter-spacing:0.5px}
.btn:hover{opacity:0.88}
.btn:active{opacity:0.75}

.err{display:none;margin-top:1rem;padding:10px 14px;background:#fdf0f0;border:1px solid #f0c0c0;border-radius:8px;font-size:12px;color:#c0392b;font-weight:600;text-align:center}
.err.show{display:block}

.footer{text-align:center;margin-top:1.75rem;font-size:11px;color:#bbb;letter-spacing:0.5px}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo">P</div>
    <div class="logo-text">
      <h1>POLAX</h1>
      <p>Allegro Analytics Dashboard</p>
    </div>
  </div>

  <div class="field">
    <label>Логин</label>
    <input type="text" id="login" placeholder="Введите логин" autocomplete="username" autofocus>
  </div>
  <div class="field">
    <label>Пароль</label>
    <input type="password" id="password" placeholder="Введите пароль" autocomplete="current-password">
  </div>

  <button class="btn" onclick="doLogin()">Войти →</button>
  <div class="err" id="err">Неверный логин или пароль</div>

  <div class="footer">Доступ только для авторизованных пользователей</div>
</div>

<script>
// Уже залогинен — редирект по роли
(function(){
  var a=localStorage.getItem('polax_auth'), r=localStorage.getItem('polax_role');
  if(a==='ok_UG9sYXhFdXJvR3JvdXA'){window.location.replace('admin.html');}
  else if(a==='ok_UG9sYXhWaWV3'){window.location.replace('index.html');}
})();

function doLogin(){
  var u=document.getElementById('login').value.trim();
  var p=document.getElementById('password').value;
  if(btoa(u)===btoa('PolaxEuroGroup') && btoa(p)===btoa('GpqXB52yBo73')){
    localStorage.setItem('polax_auth','ok_UG9sYXhFdXJvR3JvdXA');
    localStorage.setItem('polax_role','admin');
    window.location.replace('admin.html');
  } else if(btoa(u)===btoa('PolaxView') && btoa(p)===btoa('Allegro2026')){
    localStorage.setItem('polax_auth','ok_UG9sYXhWaWV3');
    localStorage.setItem('polax_role','viewer');
    window.location.replace('index.html');
  } else {
    var err=document.getElementById('err');
    err.classList.add('show');
    document.getElementById('password').value='';
    document.getElementById('password').focus();
  }
}

document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
document.getElementById('login').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('password').focus();});
</script>
</body>
</html>
